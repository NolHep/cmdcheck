name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls LOLBAS and GTFOBins

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
        working-directory: backend
        # No DATABASE_URL needed — tests fully mock the DB layer

  frontend:
    name: Frontend build + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (includes TypeScript type check)
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          # Suppress Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: "1"
