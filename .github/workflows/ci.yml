name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls LOLBAS and GTFOBins

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
        working-directory: backend
        # No DATABASE_URL needed — tests fully mock the DB layer

  frontend:
    name: Frontend build + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (includes TypeScript type check)
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          AUTH_SECRET: ci-placeholder-not-used-in-build
          NEXTAUTH_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"

  playwright:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start mock backend
        run: |
          python backend/scripts/mock_server.py &
          # Wait until the server is accepting connections
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break || sleep 0.5
          done
          echo "Mock backend ready"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
          AUTH_SECRET: ci-playwright-test-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
