[build]
# nixpacks handles Python dep install automatically.
# This runs after that to populate the LOLBAS/GTFOBins git submodules
# which Railway does not initialize by default.
buildCommand = "git submodule update --init --recursive || true"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
